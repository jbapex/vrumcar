name: vrumcar

services:
  postgres:
    image: postgres:16-alpine
    container_name: vrumcar-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: vrumcar
      POSTGRES_PASSWORD: vrumcar_dev_password
      POSTGRES_DB: vrumcar
    volumes:
      - vrumcar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vrumcar -d vrumcar']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vrumcar-redis
    ports:
      - '6379:6379'
    volumes:
      - vrumcar_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: vrumcar-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_dev_password
    volumes:
      - vrumcar_minio_data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  vrumcar_postgres_data:
  vrumcar_redis_data:
  vrumcar_minio_data:
